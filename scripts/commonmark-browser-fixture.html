<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite CommonMark Browser Fixture</title>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import specCases from "../src/core/markdown/fixtures/commonmark-0.31.2.json";
      import { renderCommonMark } from "@core/markdown/renderer";
      import React, { useEffect, useRef, useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { run } from "@core/effect/runtime";
      import { FileSystem } from "@core/fs/FileSystem";
      import { ReadingView } from "@/ui/views/ReadingView";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";
      import { useVault, VaultProvider } from "@/ui/vault/VaultContext";

      const params = new URLSearchParams(window.location.search);
      const vaultName = params.get("vault") || "commonmark-browser";
      const notePath = "Granite.md";
      const graniteSource = [
        "# Granite extensions",
        "",
        "[[Linked Note]] and #project/tag",
        "",
        "> [!warning] Heads up",
        "> Body",
        "",
        "| A |",
        "| - |",
        "| 1 |",
        "",
        "- [?] waiting",
      ].join("\n");
      const representativeExamples = [33, 119, 219, 228, 250, 317];

      window.__graniteCommonMarkBrowserResult = representativeExamples.map((example) => {
        const spec = specCases.find((item) => item.example === example);
        if (!spec) throw new Error(`Missing CommonMark example ${example}`);
        return {
          example,
          section: spec.section,
          expected: spec.html,
          actual: renderCommonMark(spec.markdown),
        };
      });

      function Harness() {
        const { activeVault, openOpfs } = useVault();
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);
        const bootingRef = useRef(false);

        useEffect(() => {
          if (ready || bootingRef.current) return;
          bootingRef.current = true;
          void (async () => {
            try {
              if (activeVault?.entry.name !== vaultName) await openOpfs(vaultName);
              await run(
                Effect.gen(function* () {
                  const fs = yield* FileSystem;
                  yield* fs.writeText(notePath, graniteSource);
                  yield* fs.writeText("Linked Note.md", "# Linked Note\n");
                }),
              );
              setReady(true);
            } catch (err) {
              setError(err instanceof Error ? err.message : String(err));
            }
          })();
        }, [activeVault, openOpfs, ready]);

        window.__graniteCommonMarkBrowserReady = ready;
        window.__graniteCommonMarkBrowserError = error;

        if (error) return React.createElement("pre", { role: "alert" }, error);
        if (!ready) return React.createElement("div", { className: "empty-state" }, "Loading");
        return React.createElement(
          "main",
          { style: { height: "100vh", width: "100vw", padding: 16 } },
          React.createElement(ReadingView, { path: notePath }),
        );
      }

      createRoot(document.querySelector("#root")).render(
        React.createElement(
          ThemeProvider,
          null,
          React.createElement(VaultProvider, null, React.createElement(Harness)),
        ),
      );
    </script>
  </body>
</html>
