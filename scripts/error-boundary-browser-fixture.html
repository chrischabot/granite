<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite Error Boundary Browser Fixture</title>
  </head>
  <body class="theme-light mod-macos">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { runFork } from "@core/effect/runtime";
      import { resetErrorReportsForTesting } from "@core/errors/reporter";
      import { ErrorBoundary } from "@/ui/overlay/ErrorBoundary";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";

      function BrokenRender({ crash }) {
        if (crash) throw new Error("Render exploded");
        return React.createElement("p", null, "Workspace survived");
      }

      function Harness() {
        const [crashRender, setCrashRender] = useState(false);

        window.__graniteErrorBoundaryCrashRender = () => setCrashRender(true);
        window.__graniteErrorBoundaryRecoverRender = () => setCrashRender(false);
        window.__graniteErrorBoundaryRejectPromise = () => {
          Promise.reject(new Error("Async promise exploded"));
        };
        window.__graniteErrorBoundaryFailEffect = () =>
          runFork(Effect.fail(new Error("Effect exploded")));

        return React.createElement(
          ThemeProvider,
          null,
          React.createElement(
            ErrorBoundary,
            null,
            React.createElement(
              "main",
              { style: { padding: 24 } },
              React.createElement(BrokenRender, { crash: crashRender }),
              React.createElement("button", { type: "button", onClick: () => setCrashRender(true) }, "Crash render"),
            ),
          ),
        );
      }

      resetErrorReportsForTesting();
      createRoot(document.querySelector("#root")).render(React.createElement(Harness));
      window.__graniteErrorBoundaryReady = true;
    </script>
  </body>
</html>
