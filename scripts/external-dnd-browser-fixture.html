<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite External DnD Browser Fixture</title>
    <style>
      body {
        margin: 0;
      }

      #root {
        height: 100vh;
      }

      .fixture-shell {
        height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }

      .fixture-sidebar {
        border-right: 1px solid var(--background-modifier-border);
        min-width: 0;
      }
    </style>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React, { useEffect, useRef, useState, useSyncExternalStore } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { run } from "@core/effect/runtime";
      import { FileSystem } from "@core/fs/FileSystem";
      import { noticeManager } from "@core/notices/notice";
      import { workspaceStore } from "@core/workspace/store";
      import { NoticeContainer } from "@/ui/overlay/NoticeContainer";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";
      import { MarkdownView } from "@/ui/views/MarkdownView";
      import { FileExplorerView } from "@/ui/views/file-explorer/FileExplorerView";
      import { useVault, VaultProvider } from "@/ui/vault/VaultContext";

      const params = new URLSearchParams(window.location.search);
      const vaultName = params.get("vault") || "external-dnd-browser";
      const notePath = "DnD.md";

      async function seedVault() {
        await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            yield* fs.mkdir("Inbox");
            yield* fs.writeText(notePath, "# DnD\n\n");
            yield* fs.writeBytes("Inbox/clip.png", new Uint8Array([9, 9, 9]));
          }),
        );
      }

      async function readText(path) {
        return await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            return yield* fs.readText(path);
          }),
        );
      }

      async function readBytes(path) {
        return await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            return [...(yield* fs.readBytes(path))];
          }),
        );
      }

      async function listAll() {
        return await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            return yield* fs.listAll();
          }),
        );
      }

      function activeMarkdownLeaf(state) {
        const group = state.activeGroupId ? state.groups.get(state.activeGroupId) : null;
        const leaf = group?.activeLeafId ? state.leaves.get(group.activeLeafId) : null;
        return leaf?.state?.type === "markdown" ? leaf : null;
      }

      function makeFile(name, bytes, type, hostPath) {
        const file = new File([new Uint8Array(bytes)], name, { type });
        if (hostPath !== undefined) {
          Object.defineProperty(file, "path", {
            configurable: true,
            value: hostPath,
          });
        }
        return file;
      }

      function dataTransfer(files) {
        const transfer = new DataTransfer();
        for (const file of files) transfer.items.add(file);
        return transfer;
      }

      function drop(target, files, options = {}) {
        const transfer = dataTransfer(files);
        const init = {
          bubbles: true,
          cancelable: true,
          dataTransfer: transfer,
          ctrlKey: options.ctrlKey === true,
          altKey: options.altKey === true,
        };
        target.dispatchEvent(new DragEvent("dragover", init));
        const event = new DragEvent("drop", init);
        const notCancelled = target.dispatchEvent(event);
        return event.defaultPrevented || !notCancelled;
      }

      function Harness() {
        const { activeVault, openOpfs } = useVault();
        const workspace = useSyncExternalStore(
          workspaceStore.subscribe,
          workspaceStore.getState,
          workspaceStore.getServerSnapshot,
        );
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);
        const openingRef = useRef(false);
        const seededRef = useRef(false);

        useEffect(() => {
          if (ready || openingRef.current) return;
          openingRef.current = true;
          void (async () => {
            try {
              if (activeVault?.entry.name !== vaultName) await openOpfs(vaultName);
              if (!seededRef.current) {
                seededRef.current = true;
                await seedVault();
              }
              workspaceStore.openFile(notePath, { mode: "source" });
              setReady(true);
            } catch (err) {
              setError(err instanceof Error ? err.message : String(err));
            }
          })();
        }, [activeVault, openOpfs, ready]);

        const leaf = activeMarkdownLeaf(workspace);

        window.__graniteExternalDndReady = ready && leaf !== null;
        window.__graniteExternalDndError = error;
        window.__graniteExternalDndState = async () => ({
          activeVaultName: activeVault?.entry.name ?? null,
          ready,
          error,
          leafId: leaf?.id ?? null,
          noteText: await readText(notePath).catch((err) => `READ_ERROR:${err instanceof Error ? err.message : String(err)}`),
          files: (await listAll()).map((entry) => ({
            path: entry.path,
            type: entry.type,
            size: entry.type === "file" ? entry.size : 0,
          })),
          notices: noticeManager.list(),
        });
        window.__graniteExternalDndReadBytes = readBytes;
        window.__graniteExternalDndDropEditorImport = () =>
          drop(document.querySelector(".cm-content"), [
            makeFile("photo.png", [1, 2, 3, 4], "image/png"),
          ]);
        window.__graniteExternalDndDropEditorFileLink = () =>
          drop(
            document.querySelector(".cm-content"),
            [makeFile("Host File.pdf", [5, 6, 7], "application/pdf", "/Users/me/Host File.pdf")],
            { altKey: true },
          );
        window.__graniteExternalDndDropEditorMissingPath = () =>
          drop(
            document.querySelector(".cm-content"),
            [makeFile("No Path.pdf", [8, 9], "application/pdf", "")],
            { altKey: true },
          );
        window.__graniteExternalDndDropFolder = () => {
          const rows = [...document.querySelectorAll(".tree-item-self")];
          const inbox = rows.find((row) => row.textContent?.includes("Inbox"));
          return drop(inbox, [
            makeFile("clip.png", [10, 11], "image/png"),
            makeFile("notes?.txt", [12], "text/plain"),
          ]);
        };
        window.__graniteExternalDndDropRoot = () =>
          drop(document.querySelector(".nav-files-container"), [
            makeFile("root file.txt", [13, 14], "text/plain"),
          ]);

        if (error) return React.createElement("pre", { role: "alert" }, error);
        if (!ready || !leaf) return React.createElement("div", { className: "empty-state" }, "Loading");
        return React.createElement(
          React.Fragment,
          null,
          React.createElement(NoticeContainer),
          React.createElement(
            "div",
            { className: "fixture-shell" },
            React.createElement(
              "aside",
              { className: "fixture-sidebar" },
              React.createElement(FileExplorerView, { activePath: notePath }),
            ),
            React.createElement(MarkdownView, {
              leafId: leaf.id,
              path: leaf.state.path,
              livePreview: false,
              fragment: leaf.state.fragment,
              folds: leaf.state.folds,
            }),
          ),
        );
      }

      createRoot(document.querySelector("#root")).render(
        React.createElement(
          ThemeProvider,
          null,
          React.createElement(VaultProvider, null, React.createElement(Harness)),
        ),
      );
    </script>
  </body>
</html>
