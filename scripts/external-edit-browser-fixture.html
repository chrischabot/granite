<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite External Edit Browser Fixture</title>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React, { useEffect, useRef, useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { run } from "@core/effect/runtime";
      import { FileSystem } from "@core/fs/FileSystem";
      import { MarkdownView } from "@/ui/views/MarkdownView";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";
      import { useVault, VaultProvider } from "@/ui/vault/VaultContext";

      const params = new URLSearchParams(window.location.search);
      const vaultName = params.get("vault") || "external-edit-browser";
      const NOTE_PATH = "External.md";
      const INITIAL = "# External\n\nInitial content\n";

      function Harness() {
        const { activeVault, openOpfs } = useVault();
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);
        const bootingRef = useRef(false);

        useEffect(() => {
          if (ready || bootingRef.current) return;
          bootingRef.current = true;
          void (async () => {
            try {
              if (!activeVault) await openOpfs(vaultName);
              await run(
                Effect.gen(function* () {
                  const fs = yield* FileSystem;
                  yield* fs.writeText(NOTE_PATH, INITIAL);
                }),
              );
              setReady(true);
            } catch (err) {
              setError(err instanceof Error ? err.message : String(err));
            }
          })();
        }, [activeVault, openOpfs, ready]);

        window.__graniteExternalEditReady = ready;
        window.__graniteExternalEditError = error;
        window.__graniteExternalEditPath = NOTE_PATH;
        window.__graniteExternalEditWrite = (text) =>
          run(
            Effect.gen(function* () {
              const fs = yield* FileSystem;
              yield* fs.writeText(NOTE_PATH, text);
            }),
          );
        window.__graniteExternalEditRead = () =>
          run(
            Effect.gen(function* () {
              const fs = yield* FileSystem;
              return yield* fs.readText(NOTE_PATH);
            }),
          );
        window.__graniteExternalEditInsert = (text) => {
          window.dispatchEvent(
            new CustomEvent("granite:insert-text", {
              detail: { path: NOTE_PATH, text },
            }),
          );
        };
        window.__graniteExternalEditDoc = () =>
          document.querySelector(".cm-content")?.cmView?.view?.state?.doc?.toString() ??
          document.querySelector(".cm-content")?.textContent ??
          "";
        window.__graniteExternalEditStatus = () =>
          document.querySelector(".save-status")?.textContent?.trim() ?? "";

        if (error) return React.createElement("pre", { role: "alert" }, error);
        if (!ready) return React.createElement("div", { className: "empty-state" }, "Loading");

        return React.createElement(
          "main",
          { style: { height: "100vh", padding: 16 } },
          React.createElement(MarkdownView, { leafId: "external-edit-leaf", path: NOTE_PATH }),
        );
      }

      createRoot(document.querySelector("#root")).render(
        React.createElement(ThemeProvider, null,
          React.createElement(VaultProvider, null, React.createElement(Harness)),
        ),
      );
    </script>
  </body>
</html>
