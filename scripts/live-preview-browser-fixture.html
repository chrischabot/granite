<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite Live Preview Browser Fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }

      #editors {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .editor-host {
        min-height: 160px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <div id="editors">
      <div id="live" class="editor-host"></div>
      <div id="source" class="editor-host"></div>
    </div>
    <script type="module">
      import { EditorSelection, EditorState } from "@codemirror/state";
      import { EditorView } from "@codemirror/view";
      import {
        computeLivePreviewRanges,
        livePreviewDecorations,
      } from "../src/core/markdown/cm-livepreview-decorations.ts";

      const doc = [
        "Cursor line stays raw",
        "plain **bold** and [[Target|alias]] with [label](Note.md)",
        "| A | B |",
        "| -- | -- |",
        "| **x** | y |",
      ].join("\n");

      const nextFrame = () => new Promise((resolve) => requestAnimationFrame(resolve));
      const renderedText = (view) => view.dom.textContent.replace(/\s+/g, " ").trim();
      const assert = (condition, message, detail = {}) => {
        if (!condition) throw new Error(`${message}: ${JSON.stringify(detail)}`);
      };

      async function run() {
        const live = new EditorView({
          state: EditorState.create({ doc, extensions: [livePreviewDecorations] }),
          parent: document.querySelector("#live"),
        });
        const source = new EditorView({
          state: EditorState.create({ doc }),
          parent: document.querySelector("#source"),
        });

        await nextFrame();
        await nextFrame();

        const liveInactive = renderedText(live);
        const sourceText = renderedText(source);

        assert(liveInactive.includes("plain bold and alias with label"), "inactive live preview keeps rendered text", {
          liveInactive,
        });
        assert(!liveInactive.includes("**bold**"), "inactive live preview hides bold markers", {
          liveInactive,
        });
        assert(!liveInactive.includes("[[Target|alias]]"), "inactive live preview hides wikilink markers", {
          liveInactive,
        });
        assert(!liveInactive.includes("[label](Note.md)"), "inactive live preview hides markdown-link chrome", {
          liveInactive,
        });
        assert(!liveInactive.includes("| -- | -- |"), "inactive live preview hides table separator source", {
          liveInactive,
        });

        assert(sourceText.includes("**bold**"), "source mode keeps bold markers", { sourceText });
        assert(sourceText.includes("[[Target|alias]]"), "source mode keeps wikilink markers", {
          sourceText,
        });
        assert(sourceText.includes("[label](Note.md)"), "source mode keeps markdown-link chrome", {
          sourceText,
        });

        const secondLine = live.state.doc.line(2);
        live.dispatch({
          selection: EditorSelection.cursor(secondLine.from + "plain ".length),
          scrollIntoView: true,
        });
        await nextFrame();
        await nextFrame();

        const liveActive = renderedText(live);
        assert(liveActive.includes("**bold**"), "active live-preview line reveals bold markers", {
          liveActive,
        });
        assert(liveActive.includes("[[Target|alias]]"), "active live-preview line reveals wikilink markers", {
          liveActive,
        });
        assert(liveActive.includes("[label](Note.md)"), "active live-preview line reveals markdown-link source", {
          liveActive,
        });

        live.destroy();
        source.destroy();

        // Perf assertion: AST-driven decoration on a 5000-line document
        // should complete in well under 100ms in real browser environments.
        const perfLines = [];
        for (let i = 0; i < 5000; i++) {
          if (i % 7 === 0) perfLines.push(`## Heading ${i}`);
          else if (i % 5 === 0) perfLines.push(`- [ ] task **bold** ${i}`);
          else if (i % 3 === 0) perfLines.push(`paragraph [[Note ${i}|alias]] ==hi==`);
          else perfLines.push(`plain ${i} *em* \`code\` ~~strike~~`);
        }
        const perfText = perfLines.join("\n");
        computeLivePreviewRanges(perfText, -1); // warmup
        const perfStart = performance.now();
        computeLivePreviewRanges(perfText, -1);
        const perfElapsed = performance.now() - perfStart;
        assert(perfElapsed < 100, "5000-line decoration completes in under 100ms", {
          perfElapsed,
        });

        return { ok: true, liveInactive, liveActive, sourceText, perfElapsed };
      }

      window.__graniteLivePreviewResult = run().catch((error) => ({
        ok: false,
        message: error instanceof Error ? error.message : String(error),
        stack: error instanceof Error ? error.stack : undefined,
      }));
    </script>
  </body>
</html>
