<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite Native Formats Browser Fixture</title>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React from "react";
      import { createRoot } from "react-dom/client";
      import { FileSystem } from "../src/core/fs/FileSystem.ts";
      import { extension } from "../src/core/fs/path.ts";
      import { disposeRuntime, setAppLayer } from "../src/core/effect/runtime.ts";
      import { workspaceStore } from "../src/core/workspace/store.ts";
      import { LeafBody } from "../src/ui/workspace/Leaf.tsx";
      import { Effect, Layer } from "effect";

      const textFiles = new Map([
        ["Notes/Native.md", "# Native Markdown\n\nThis note proves Markdown routes to the editor view."],
        [
          "Boards/Native.canvas",
          JSON.stringify(
            {
              nodes: [{ id: "a", type: "text", x: 0, y: 0, width: 220, height: 100, text: "Canvas node" }],
              edges: [],
            },
            null,
            2,
          ),
        ],
        [
          "Bases/Native.base",
          [
            "name: Native base",
            "columns:",
            "  - file.name",
            "  - file.path",
            "view: table",
            "",
          ].join("\n"),
        ],
      ]);

      const byteFiles = new Map([
        [
          "Media/Pixel.png",
          Uint8Array.from([
            137, 80, 78, 71, 13, 10, 26, 10, 0, 0, 0, 13, 73, 72, 68, 82, 0, 0, 0, 1, 0, 0, 0,
            1, 8, 6, 0, 0, 0, 31, 21, 196, 137, 0, 0, 0, 13, 73, 68, 65, 84, 120, 156, 99, 248,
            15, 4, 0, 9, 251, 3, 253, 167, 80, 157, 127, 0, 0, 0, 0, 73, 69, 78, 68, 174, 66,
            96, 130,
          ]),
        ],
        ["Media/Tone.mp3", new Uint8Array([73, 68, 51, 4, 0, 0, 0, 0, 0, 0])],
        ["Media/Movie.mp4", new Uint8Array([0, 0, 0, 24, 102, 116, 121, 112, 105, 115, 111, 109])],
        [
          "Docs/Native.pdf",
          new TextEncoder().encode("%PDF-1.4\n1 0 obj\n<< /Type /Catalog >>\nendobj\n%%EOF\n"),
        ],
      ]);

      function allEntries() {
        const out = [];
        for (const [path, text] of textFiles) {
          out.push(fileEntry(path, text.length));
        }
        for (const [path, bytes] of byteFiles) {
          out.push(fileEntry(path, bytes.length));
        }
        return out;
      }

      function fileEntry(path, size) {
        return {
          type: "file",
          path,
          name: path.split("/").pop() ?? path,
          size,
          mtimeMs: 0,
          ctimeMs: 0,
          extension: extension(path),
        };
      }

      function makeFs() {
        return {
          rootName: "native-format-browser-vault",
          list: () => Effect.succeed([]),
          listAll: (opts) => {
            const extensions = new Set(opts?.extensions ?? []);
            return Effect.succeed(
              allEntries().filter((entry) => extensions.size === 0 || extensions.has(entry.extension)),
            );
          },
          readText: (path) => {
            const text = textFiles.get(path);
            if (text !== undefined) return Effect.succeed(text);
            const bytes = byteFiles.get(path);
            if (bytes !== undefined) return Effect.succeed(new TextDecoder().decode(bytes));
            return Effect.fail({ _tag: "FsNotFound", path });
          },
          readBytes: (path) => {
            const bytes = byteFiles.get(path);
            if (bytes !== undefined) return Effect.succeed(bytes);
            const text = textFiles.get(path);
            if (text !== undefined) return Effect.succeed(new TextEncoder().encode(text));
            return Effect.fail({ _tag: "FsNotFound", path });
          },
          writeText: () => Effect.void,
          writeBytes: () => Effect.void,
          mkdir: () => Effect.void,
          rename: () => Effect.void,
          remove: () => Effect.void,
          stat: (path) => {
            const text = textFiles.get(path);
            if (text !== undefined) return Effect.succeed(fileEntry(path, text.length));
            const bytes = byteFiles.get(path);
            if (bytes !== undefined) return Effect.succeed(fileEntry(path, bytes.length));
            return Effect.succeed(null);
          },
          watch: () => () => {},
        };
      }

      const root = createRoot(document.querySelector("#root"));

      function renderActiveLeaf() {
        const state = workspaceStore.getState();
        const group = state.activeGroupId ? state.groups.get(state.activeGroupId) : null;
        const leaf = group?.activeLeafId ? state.leaves.get(group.activeLeafId) : null;
        if (!leaf) throw new Error("No active leaf after opening path");
        root.render(React.createElement(LeafBody, { leaf, isActiveGroup: true }));
        return leaf;
      }

      function waitFor(description, predicate) {
        const started = performance.now();
        return new Promise((resolve, reject) => {
          const tick = () => {
            if (predicate()) {
              resolve();
              return;
            }
            if (performance.now() - started > 3000) {
              reject(new Error(`Timed out waiting for ${description}`));
              return;
            }
            requestAnimationFrame(tick);
          };
          tick();
        });
      }

      async function openAndAssert(path, expectedType, selector, expectedKind = null) {
        const leafId = workspaceStore.openPath(path, { newTab: true });
        const leaf = renderActiveLeaf();
        if (leaf.id !== leafId) throw new Error(`Active leaf mismatch for ${path}`);
        if (leaf.state.type !== expectedType) {
          throw new Error(`Expected ${path} to open as ${expectedType}, got ${leaf.state.type}`);
        }
        if (expectedKind !== null && leaf.state.kind !== expectedKind) {
          throw new Error(`Expected ${path} asset kind ${expectedKind}, got ${leaf.state.kind}`);
        }
        await waitFor(`${path} selector ${selector}`, () => document.querySelector(selector));
        const title = document.querySelector(".view-header-title")?.textContent?.trim() ?? "";
        return {
          path,
          leafType: leaf.state.type,
          kind: leaf.state.kind ?? null,
          title,
          selector,
        };
      }

      async function run() {
        await disposeRuntime();
        setAppLayer(() => Layer.succeed(FileSystem, makeFs()));
        const checks = [];
        checks.push(await openAndAssert("Notes/Native.md", "markdown", ".cm-editor"));
        checks.push(await openAndAssert("Boards/Native.canvas", "canvas", ".canvas-view"));
        checks.push(await openAndAssert("Bases/Native.base", "bases", ".bases-view"));
        checks.push(await openAndAssert("Media/Pixel.png", "asset", ".asset-view.mod-image img", "image"));
        checks.push(await openAndAssert("Media/Tone.mp3", "asset", ".asset-view.mod-audio audio", "audio"));
        checks.push(await openAndAssert("Media/Movie.mp4", "asset", ".asset-view.mod-video video", "video"));
        checks.push(await openAndAssert("Docs/Native.pdf", "asset", ".asset-view.mod-pdf iframe", "pdf"));
        await disposeRuntime();
        return { ok: true, checks };
      }

      window.__graniteNativeFormatsResult = run().catch((error) => ({
        ok: false,
        message: error instanceof Error ? error.message : String(error),
        stack: error instanceof Error ? error.stack : undefined,
      }));
    </script>
  </body>
</html>
