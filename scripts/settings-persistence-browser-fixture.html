<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite Settings Persistence Browser Fixture</title>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React, { useEffect, useRef, useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { run } from "@core/effect/runtime";
      import { FileSystem } from "@core/fs/FileSystem";
      import { DEFAULT_SETTINGS, settingsStore } from "@core/settings/store";
      import { SettingsModal } from "@/ui/prompts/SettingsModal";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";
      import { useVault, VaultProvider } from "@/ui/vault/VaultContext";

      const params = new URLSearchParams(window.location.search);
      const vaultName = params.get("vault") || "settings-persistence-browser";

      function Harness() {
        const { activeVault, openOpfs } = useVault();
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);
        const bootingRef = useRef(false);

        useEffect(() => {
          if (ready || bootingRef.current) return;
          bootingRef.current = true;
          void (async () => {
            try {
              if (activeVault?.entry.name !== vaultName) await openOpfs(vaultName);
              setReady(true);
            } catch (err) {
              setError(err instanceof Error ? err.message : String(err));
            }
          })();
        }, [activeVault, openOpfs, ready]);

        window.__graniteSettingsPersistenceReady = ready;
        window.__graniteSettingsPersistenceError = error;
        window.__graniteSettingsPersistenceDefaultKeys = Object.keys(DEFAULT_SETTINGS);
        window.__graniteSettingsPersistenceOpenVault = async (name) => {
          await openOpfs(name);
        };
        window.__graniteSettingsPersistenceReadDiskSettings = async () =>
          await run(
            Effect.gen(function* () {
              const fs = yield* FileSystem;
              return JSON.parse(yield* fs.readText(".granite/settings.json"));
            }),
          );
        window.__graniteSettingsPersistenceState = () => settingsStore.getState();
        window.__graniteSettingsPersistenceActiveVaultName = () => activeVault?.entry.name ?? null;
        window.__graniteSettingsPersistenceSetLegacy = (patch) => {
          localStorage.setItem(
            "granite.settings.v1",
            JSON.stringify({ ...DEFAULT_SETTINGS, ...patch }),
          );
        };

        if (error) return React.createElement("pre", { role: "alert" }, error);
        if (!ready) return React.createElement("div", { className: "empty-state" }, "Loading");
        return React.createElement(SettingsModal, { open: true, onClose: () => {} });
      }

      createRoot(document.querySelector("#root")).render(
        React.createElement(
          ThemeProvider,
          null,
          React.createElement(VaultProvider, null, React.createElement(Harness)),
        ),
      );
    </script>
  </body>
</html>
