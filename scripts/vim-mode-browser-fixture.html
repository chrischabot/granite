<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Granite Vim Mode Browser Fixture</title>
    <style>
      body {
        margin: 0;
      }

      #root {
        height: 100vh;
      }

      .fixture-shell {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .fixture-toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid var(--background-modifier-border);
        background: var(--background-secondary);
      }
    </style>
  </head>
  <body class="theme-light mod-macos show-view-header">
    <div id="root"></div>
    <script type="module">
      import "../src/styles/index.css";
      import React, { useEffect, useRef, useState, useSyncExternalStore } from "react";
      import { createRoot } from "react-dom/client";
      import { Effect } from "effect";
      import { run } from "@core/effect/runtime";
      import { FileSystem } from "@core/fs/FileSystem";
      import { settingsStore } from "@core/settings/store";
      import { workspaceStore } from "@core/workspace/store";
      import { SettingsModal } from "@/ui/prompts/SettingsModal";
      import { ThemeProvider } from "@/ui/theme/ThemeProvider";
      import { MarkdownView } from "@/ui/views/MarkdownView";
      import { useVault, VaultProvider } from "@/ui/vault/VaultContext";

      const params = new URLSearchParams(window.location.search);
      const vaultName = params.get("vault") || "vim-mode-browser";
      const notePath = "Vim.md";
      const initialText = "alpha\nbeta\n";

      async function seedVault() {
        await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            yield* fs.writeText(notePath, initialText);
          }),
        );
      }

      async function readNote() {
        return await run(
          Effect.gen(function* () {
            const fs = yield* FileSystem;
            return yield* fs.readText(notePath);
          }),
        );
      }

      function activeMarkdownLeaf(state) {
        const group = state.activeGroupId ? state.groups.get(state.activeGroupId) : null;
        const leaf = group?.activeLeafId ? state.leaves.get(group.activeLeafId) : null;
        return leaf?.state?.type === "markdown" ? leaf : null;
      }

      function Harness() {
        const { activeVault, openOpfs } = useVault();
        const workspace = useSyncExternalStore(
          workspaceStore.subscribe,
          workspaceStore.getState,
          workspaceStore.getServerSnapshot,
        );
        const settings = useSyncExternalStore(
          settingsStore.subscribe,
          settingsStore.getState,
          settingsStore.getServerSnapshot,
        );
        const [settingsOpen, setSettingsOpen] = useState(true);
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);
        const openingRef = useRef(false);
        const seededRef = useRef(false);

        useEffect(() => {
          if (ready || openingRef.current) return;
          openingRef.current = true;
          void (async () => {
            try {
              if (activeVault?.entry.name !== vaultName) await openOpfs(vaultName);
              if (!seededRef.current) {
                seededRef.current = true;
                await seedVault();
              }
              workspaceStore.openFile(notePath, { mode: "source" });
              setReady(true);
            } catch (err) {
              setError(err instanceof Error ? err.message : String(err));
            }
          })();
        }, [activeVault, openOpfs, ready]);

        const leaf = activeMarkdownLeaf(workspace);

        window.__graniteVimModeReady = ready && leaf !== null;
        window.__graniteVimModeError = error;
        window.__graniteVimModeState = async () => ({
          activeVaultName: activeVault?.entry.name ?? null,
          ready,
          error,
          settingsOpen,
          editorKeymap: settings.editorKeymap,
          leafId: leaf?.id ?? null,
          editorText: document.querySelector(".cm-editor")?.textContent ?? "",
          diskText: await readNote().catch((err) => `READ_ERROR:${err instanceof Error ? err.message : String(err)}`),
        });
        window.__graniteVimModeCloseSettings = () => setSettingsOpen(false);

        if (error) return React.createElement("pre", { role: "alert" }, error);
        return React.createElement(
          "div",
          { className: "fixture-shell" },
          React.createElement(
            "div",
            { className: "fixture-toolbar" },
            React.createElement(
              "button",
              { type: "button", onClick: () => setSettingsOpen(true) },
              "Open settings",
            ),
            React.createElement("span", null, ready ? "Vim fixture ready" : "Loading"),
          ),
          leaf?.state.type === "markdown"
            ? React.createElement(MarkdownView, {
                key: `${leaf.id}:${settings.editorKeymap}`,
                leafId: leaf.id,
                path: leaf.state.path,
                livePreview: leaf.state.mode === "live-preview",
                fragment: leaf.state.fragment,
                folds: leaf.state.folds,
              })
            : null,
          React.createElement(SettingsModal, {
            open: settingsOpen,
            onClose: () => setSettingsOpen(false),
          }),
        );
      }

      createRoot(document.querySelector("#root")).render(
        React.createElement(
          ThemeProvider,
          null,
          React.createElement(VaultProvider, null, React.createElement(Harness)),
        ),
      );
    </script>
  </body>
</html>
